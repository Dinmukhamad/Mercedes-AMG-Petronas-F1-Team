<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Видео — F1 Statistics Dashboard</title>
  <meta name="description" content="Видеохайлайты, обзоры гонок и интервью пилотов Формулы-1.">
  <meta name="theme-color" content="#081013">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="dns-prefetch" href="https://f1-dashboard-backend-ri9z.onrender.com">
  <link rel="stylesheet" href="css/style.min.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="/index.html" class="navbar-logo">
      <div class="logo-mark">F1</div>
      <span class="logo-text">F1 <span>Stats</span></span>
    </a>
    <div class="navbar-nav">
      <a href="/index.html"        class="nav-link">Главная</a>
      <a href="/drivers.html"      class="nav-link">Гонщики</a>
      <a href="/constructors.html" class="nav-link">Команды</a>
      <a href="/races.html"        class="nav-link">Гонки</a>
      <a href="/videos.html"       class="nav-link active">Видео</a>
      <a href="/gallery.html"      class="nav-link">Галерея</a>
    </div>
    <div class="navbar-actions">
      <select class="season-select" id="nav-season-select"></select>
      <div id="navbar-auth"></div>
    </div>
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
  </div>
</nav>
<div class="mobile-menu" id="mobile-menu">
  <a href="/index.html"  class="nav-link">Главная</a>
  <a href="/videos.html" class="nav-link">Видео</a>
</div>

<div class="page-wrapper">
  <div class="page-header">
    <div class="container">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;">
        <div>
          <p class="page-breadcrumb"><a href="/index.html">Главная</a> <span class="sep">›</span> Видео</p>
          <h1 class="page-title">Видео</h1>
        </div>
        <select class="season-select" id="page-season-select"></select>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="container">
      <div class="filter-bar">
        <div class="search-bar">
          <span class="search-icon">🔍</span>
          <input type="text" class="form-control" id="search-video" placeholder="Поиск по названию...">
        </div>
        <select class="form-control" id="filter-type">
          <option value="">Все типы</option>
          <option value="race_review">Обзор гонки</option>
          <option value="highlights">Хайлайты</option>
          <option value="qualifying">Квалификация</option>
          <option value="fp">Практика</option>
          <option value="interview">Интервью</option>
          <option value="onboard">Onboard</option>
          <option value="press_conference">Пресс-конф.</option>
          <option value="tech_review">Технический разбор</option>
        </select>
        <select class="form-control" id="filter-race"><option value="">Все гонки</option></select>
      </div>

      <div id="video-count" style="font-size:.82rem;color:var(--text-muted);margin-bottom:16px;"></div>

      <div class="video-grid" id="video-grid">
        <div class="loading-spinner"><div class="spinner"></div><span>Загрузка...</span></div>
      </div>

      <div id="load-more-wrap" style="text-align:center;margin-top:32px;display:none;">
        <button class="btn btn-secondary" id="load-more-btn">Загрузить ещё</button>
      </div>
    </div>
  </div>
</div>

<!-- Video modal -->
<div class="video-modal-overlay" id="video-modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="video-modal">
    <div class="video-modal-header">
      <span class="video-modal-title" id="video-modal-title"></span>
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">✕ Закрыть</button>
    </div>
    <div class="video-iframe-wrap"><iframe id="video-modal-iframe" allowfullscreen></iframe></div>
  </div>
</div>

<footer class="footer">
  <div class="container">
    <div class="footer-bottom"><span>© 2025–2026 F1 Statistics Dashboard</span></div>
  </div>
</footer>


  <script src="js/bundle.min.js" defer></script>
  <script src="js/videos.min.js" defer></script>
</body>
</html>
