<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — F1 Statistics Dashboard</title>
  <link rel="stylesheet" href="css/style.css?v=readability-1">
</head>
<body>

<div class="auth-page">
  <!-- Background grid -->
  <div style="position:fixed;inset:0;background-image:linear-gradient(rgba(0,210,190,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,210,190,0.03) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;"></div>

  <div class="auth-card">
    <div class="auth-header">
      <a href="/index.html" class="navbar-logo" style="justify-content:center;margin-bottom:20px;">
        <div class="logo-mark">F1</div>
        <span class="logo-text">F1 <span>Stats</span></span>
      </a>
      <h1 class="auth-title">Вход</h1>
      <p class="auth-subtitle">Войдите, чтобы добавлять избранных пилотов и команды</p>
    </div>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input type="email" class="form-control" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Пароль</label>
        <div style="position:relative;">
          <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
          <button type="button" onclick="togglePasswordVisibility('password')"
            style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:.85rem;">
            👁
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px;">
        Войти
      </button>
    </form>

    <div class="auth-footer-text">
      Нет аккаунта? <a href="/register.html">Зарегистрироваться</a>
    </div>
    <div style="text-align:center;margin-top:12px;">
      <a href="/index.html" style="font-size:.8rem;color:var(--text-muted);">← На главную</a>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/main.js"></script>
<script>
function togglePasswordVisibility(inputId) {
  const input = document.getElementById(inputId);
  if (input) input.type = input.type === 'password' ? 'text' : 'password';
}

document.addEventListener('DOMContentLoaded', () => {
  initLoginPage();
});
</script>
</body>
</html>
