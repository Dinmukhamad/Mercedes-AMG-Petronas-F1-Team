<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Гонщики — F1 Statistics Dashboard</title>
  <meta name="description" content="Личный зачёт гонщиков, статистика и профили всех пилотов Формулы-1.">
  <meta name="theme-color" content="#081013">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="dns-prefetch" href="https://f1-dashboard-backend-ri9z.onrender.com">
  <link rel="stylesheet" href="css/style.min.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="/index.html" class="navbar-logo">
      <div class="logo-mark">F1</div>
      <span class="logo-text">F1 <span>Stats</span></span>
    </a>
    <div class="navbar-nav">
      <a href="/index.html"        class="nav-link">Главная</a>
      <a href="/drivers.html"      class="nav-link active">Гонщики</a>
      <a href="/constructors.html" class="nav-link">Команды</a>
      <a href="/races.html"        class="nav-link">Гонки</a>
      <a href="/videos.html"       class="nav-link">Видео</a>
      <a href="/gallery.html"      class="nav-link">Галерея</a>
    </div>
    <div class="navbar-actions">
      <select class="season-select" id="nav-season-select"></select>
      <div id="navbar-auth"></div>
    </div>
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
  </div>
</nav>
<div class="mobile-menu" id="mobile-menu">
  <a href="/index.html"        class="nav-link">Главная</a>
  <a href="/drivers.html"      class="nav-link">Гонщики</a>
  <a href="/constructors.html" class="nav-link">Команды</a>
  <a href="/races.html"        class="nav-link">Гонки</a>
  <a href="/videos.html"       class="nav-link">Видео</a>
  <a href="/gallery.html"      class="nav-link">Галерея</a>
</div>

<div class="page-wrapper">
  <div class="page-header">
    <div class="container">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;">
        <div>
          <p class="page-breadcrumb"><a href="/index.html">Главная</a> <span class="sep">›</span> Гонщики</p>
          <h1 class="page-title">Гонщики</h1>
        </div>
        <select class="season-select" id="page-season-select"></select>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="container">

      <!-- PODIUM -->
      <div id="podium-container" class="mb-32"></div>

      <!-- TABS: standings / drivers list -->
      <div class="tabs" id="tabs-root">
        <button class="tab-btn active" data-tab="standings">Личный зачёт</button>
        <button class="tab-btn"        data-tab="all">Все гонщики</button>
      </div>

      <!-- TAB: STANDINGS -->
      <div class="tab-panel active" id="tab-standings">
        <div class="charts-grid mb-24">
          <div class="chart-card">
            <div class="chart-title">Очки гонщиков</div>
            <div class="chart-container"><canvas id="chart-drivers-pts"></canvas></div>
          </div>
          <div class="chart-card">
            <div class="chart-title">Подиумы</div>
            <div class="chart-container"><canvas id="chart-podiums"></canvas></div>
          </div>
        </div>
        <div class="table-wrapper" id="standings-table-wrap">
          <div class="loading-spinner"><div class="spinner"></div><span>Загрузка...</span></div>
        </div>
      </div>

      <!-- TAB: ALL DRIVERS -->
      <div class="tab-panel" id="tab-all">
        <div class="filter-bar">
          <div class="search-bar">
            <span class="search-icon">🔍</span>
            <input type="text" class="form-control" id="search-driver" placeholder="Поиск по имени...">
          </div>
          <select class="form-control" id="filter-team">
            <option value="">Все команды</option>
          </select>
          <select class="form-control" id="filter-status">
            <option value="">Все статусы</option>
            <option value="active">Активные</option>
            <option value="reserve">Резервные</option>
            <option value="finished">Завершили сезон</option>
          </select>
        </div>
        <div class="table-wrapper" id="drivers-table-wrap">
          <div class="loading-spinner"><div class="spinner"></div><span>Загрузка...</span></div>
        </div>
      </div>

    </div>
  </div>
</div>

<footer class="footer">
  <div class="container">
    <div class="footer-bottom">
      <span>© 2025–2026 F1 Statistics Dashboard</span>
      <span>Данные: Jolpica F1 API</span>
    </div>
  </div>
</footer>

</body>
</html>
